spring:
  application:
    name: event-store-service
  cloud:
    nacos:
      config:
        server-addr: localhost:8848
        file-extension: yml
        shared-configs:
          - data-id: shared-db.yml
            refresh: true
          - data-id: shared-redis.yml
            refresh: true
          - data-id: shared-kafka.yml
            refresh: true
