server:
  port: 8086

spring:
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  # Local profile for development (without Nacos)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/user_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

jwt:
  keystore:
    path: classpath:keys/jwt-keystore.p12
    password: auction2024
    alias: jwt-key
  issuer: auction-platform
  access-token-ttl-seconds: 86400
